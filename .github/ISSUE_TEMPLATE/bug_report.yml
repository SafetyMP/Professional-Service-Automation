name: Bug report
description: Report something that is broken or behaves incorrectly
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please search [existing issues](https://github.com/SafetyMP/Professional-Service-Automation/issues) first.

        **Do not use this form for security vulnerabilities.** See [SECURITY.md](https://github.com/SafetyMP/Professional-Service-Automation/blob/main/SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I approve a time entry and generate an invoice, ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: The invoice should include the approved time entry.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Log in as admin@demo.com
        2. Go to Time
        3. ...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Authentication / RBAC
        - Clients & projects
        - Time tracking
        - Expenses
        - Resources & utilization
        - Billing & invoices
        - Reporting & dashboard
        - Database / migrations
        - CI / tooling
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Release tag, npm version, or git SHA if known.
      placeholder: v0.1.0 or abc1234

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, database setup, browser if UI-related.
      placeholder: |
        - OS: macOS 15
        - Node: 22.x
        - DB: Docker Compose Postgres on port 5440
        - Browser: Chrome 138
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant terminal output, stack traces, or attach screenshots.
    validations:
      required: false
