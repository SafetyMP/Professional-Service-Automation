version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: chore
      include: scope
    groups:
      prisma:
        patterns:
          - "@prisma/*"
          - "prisma"
      next:
        patterns:
          - "next"
          - "eslint-config-next"
      auth:
        patterns:
          - "next-auth"
          - "@auth/*"
      playwright:
        patterns:
          - "playwright"
          - "@playwright/*"
    ignore:
      - dependency-name: "next-auth"
        update-types: ["version-update:semver-major"]
      # ESLint 10 breaks eslint-config-next until eslint-plugin-react supports it
      - dependency-name: "eslint"
        versions: ["10.*"]
      # Pinned for @prisma/adapter-pg compatibility (see prisma#29646)
      - dependency-name: "pg"
        versions: [">=8.19"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
      include: scope
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: chore
      include: scope
    ignore:
      - dependency-name: "node"
        # Stay on Node 22 LTS until app and toolchain are validated on newer majors
        versions: [">=25"]
