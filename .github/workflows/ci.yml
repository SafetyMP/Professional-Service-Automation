name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DATABASE_URL: postgresql://psa_app:psa_app_dev@localhost:5432/psa?schema=public
  DIRECT_URL: postgresql://postgres:postgres@localhost:5432/psa?schema=public
  AUTH_SECRET: ci-test-secret-min-32-chars-long!!
  AUTH_URL: http://localhost:3000
  PLAYWRIGHT_BASE_URL: http://localhost:3000
  CURSOR_VERIFY_SKIP: "1"

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: psa
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Setup database
        env:
          PGPASSWORD: postgres
        run: bash scripts/ci-setup-db.sh

      - run: ./scripts/verify.sh

      - name: Production build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: psa
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Setup database with demo seed
        env:
          PGPASSWORD: postgres
          SEED_DEMO: "true"
        run: bash scripts/ci-setup-db.sh

      - run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Start server
        run: |
          npm start &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/login >/dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server failed to start"
          exit 1

      - name: Integration E2E
        run: ./scripts/integration-e2e.sh

      - name: Adversarial tier
        run: ./scripts/adversarial.sh
