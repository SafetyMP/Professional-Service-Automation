name: Screenshots

on:
  release:
    types: [published]
  schedule:
    # First of each month — catch UI drift
    - cron: "0 12 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://psa_app:psa_app_dev@localhost:5432/psa?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/psa?schema=public
      AUTH_SECRET: ci-screenshot-secret-min-32-chars!!
      AUTH_URL: http://localhost:3000
      SCREENSHOT_BASE_URL: http://localhost:3000
      CI: "1"

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: psa
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Setup database role
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d psa -c "CREATE ROLE psa_app WITH LOGIN PASSWORD 'psa_app_dev' NOSUPERUSER;"
          psql -h localhost -U postgres -d psa -c "GRANT CONNECT ON DATABASE psa TO psa_app;"
          psql -h localhost -U postgres -d psa -c "GRANT ALL ON SCHEMA public TO psa_app;"

      - run: npx prisma migrate deploy

      - name: Apply RLS
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d psa -f prisma/rls.sql

      - run: npm run db:seed

      - run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Start server
        run: |
          npm start &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/login >/dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server failed to start"
          exit 1

      - run: npm run screenshots

      - uses: actions/upload-artifact@v4
        with:
          name: readme-screenshots
          path: |
            docs/images/dashboard.png
            docs/images/invoices.png
            docs/images/profitability.png
            docs/images/demo.gif
          retention-days: 90
